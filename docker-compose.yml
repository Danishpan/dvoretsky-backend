services:

  backend:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - music-mock

  music-mock:
    build: .
    restart: always
    command: uvicorn mock.music_mock:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"
    env_file: .env
